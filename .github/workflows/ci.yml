name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate development compose
        run: docker compose -f docker-compose.yml config

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config

      - name: Ensure production compose does not start dev servers
        shell: bash
        run: |
          rendered="$(docker compose -f docker-compose.prod.yml config)"
          if echo "$rendered" | grep -E 'start:dev|vite dev' >/dev/null; then
            echo "Production compose contains dev server commands"
            exit 1
          fi

  docker:
    runs-on: ubuntu-latest
    needs:
      - compose
      - backend
      - frontend
      - dependency-review
    if: ${{ always() && needs.compose.result == 'success' && needs.backend.result == 'success' && needs.frontend.result == 'success' && (github.event_name != 'pull_request' || needs.dependency-review.result == 'success') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t barberbook-backend:${{ github.sha }} backend

      - name: Build frontend image
        run: docker build -t barberbook-frontend:${{ github.sha }} frontend

      - name: Build nginx image
        run: docker build -t barberbook-nginx:${{ github.sha }} nginx

x-backend-env: &backend-env
  NODE_ENV: ${NODE_ENV:-development}
  PORT: ${PORT:-3001}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-barbershop}
  DB_USER: ${DB_USER:-barber}
  DB_PASSWORD: ${DB_PASSWORD:-REPLACE_WITH_STRONG_DB_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-barbershop}
  POSTGRES_USER: ${POSTGRES_USER:-barber}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REPLACE_WITH_STRONG_DB_PASSWORD}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  BACKUP_STATUS_FILE: ${BACKUP_STATUS_FILE:-./ops/backup-state/last-success.json}
  BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-24}
  JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_LONG_RANDOM_JWT_SECRET}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-REPLACE_WITH_ADMIN_PASSWORD}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
  TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:3001}
  PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
  PAYMENT_RECONCILIATION_INTERVAL_MS: ${PAYMENT_RECONCILIATION_INTERVAL_MS:-300000}
  LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
  LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
  LIQPAY_SANDBOX: ${LIQPAY_SANDBOX:-false}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-barbershop}
      POSTGRES_USER: ${POSTGRES_USER:-barber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REPLACE_WITH_STRONG_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: development
    environment:
      <<: *backend-env
      NODE_ENV: development
      DB_SYNCHRONIZE: "false"
      TELEGRAM_MODE: outbound
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run migration:run && npm run start:dev"
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src

  worker:
    build:
      context: ./backend
      target: development
    environment:
      <<: *backend-env
      NODE_ENV: development
      DB_SYNCHRONIZE: "false"
      TELEGRAM_MODE: polling
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run start:worker:dev"
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: /api/v1
      VITE_DEV_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: barbershop
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:


services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: development
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DB_SYNCHRONIZE: "false"
      TELEGRAM_MODE: outbound
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run migration:run && npm run start:dev"
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src

  worker:
    build:
      context: ./backend
      target: development
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DB_SYNCHRONIZE: "false"
      TELEGRAM_MODE: polling
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run start:worker:dev"
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: /api/v1
      VITE_DEV_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
